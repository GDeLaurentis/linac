name: CI Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  CI-Lint:

    strategy:
      matrix:
        os: [self-hosted, ]  # ubuntu-latest, macos-latest, windows-latest
        python-version: ['3.10', ]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Checkout this Repo (linac)
      uses: actions/checkout@v4
      with:
        path: linac

    - name: Check CUDA is discoverable
      run: |
        echo "CPATH=$CPATH"
        echo "PATH=$PATH"
        echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"

        nvcc --version
        nvidia-smi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e linac[full]

    - name: Lint with flake8
      run: |
        cd linac
        flake8 linac/ --count --max-line-length=190 --statistics --verbose
