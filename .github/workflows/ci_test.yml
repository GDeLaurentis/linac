name: CI Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  CI-Test:

    strategy:
      matrix:
        os: [self-hosted, ]  # ubuntu-latest, macos-latest, windows-latest
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Checkout this Repo (linac-dev)
      uses: actions/checkout@v4
      with:
        path: linac-dev

    - name: Checkout another Repo (pycoretools)
      uses: actions/checkout@v4
      with:
        repository: GDeLaurentis/pycoretools
        token: ${{ secrets.GitHubActions_PAT }}
        path: pycoretools

    - name: Checkout another Repo (pyadic)
      uses: actions/checkout@v4
      with:
        repository: GDeLaurentis/pyadic
        token: ${{ secrets.GitHubActions_PAT }}
        path: pyadic

    - name: Checkout another Repo (syngular)
      uses: actions/checkout@v4
      with:
        repository: GDeLaurentis/syngular
        token: ${{ secrets.GitHubActions_PAT }}
        path: syngular

    - name: Check CUDA is discoverable
      run: |
        echo "CPATH=$CPATH"
        echo "PATH=$PATH"
        echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"

        nvcc --version
        nvidia-smi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e pycoretools
        pip install -e pyadic
        pip install -e syngular
        pip install -e linac-dev[full]

    - name: Test with pytest
      run: |
        cd linac-dev
        pytest |& tee coverage.txt
        PYTEST_EXIT_CODE=${PIPESTATUS[0]}
        if [ "$PYTEST_EXIT_CODE" -ne 0 ]; then
          echo "pytest failed with exit code $PYTEST_EXIT_CODE"
          exit 1
        else
          echo "pytest passed with exit code 0"
        fi

    - name: Run update-badges script
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
      run: |
        cd linac-dev
        python update-badges.py

    - name: Update badges and commit README.md
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        file_pattern: README.md
        repository: linac-dev
        commit_message: "Automatic badge update"
