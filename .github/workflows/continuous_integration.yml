# -*- coding: utf-8 -*-

name: Continuous Integration

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    branches: [ master ]

jobs:

  test:
    # Use ubuntu-latest for remote github's cpu machine
    # Requires removing [full] from linac-dev to avoid attempting to install pycuda
    # runs-on: ubuntu-latest
    runs-on: [self-hosted]

    steps:
    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
    - name: Checkout this Repo (linac-dev)
      uses: actions/checkout@v2
      with:
        path: linac-dev
    - name: Checkout another private Repo (lips-dev)
      uses: actions/checkout@v2
      with:
        repository: GDeLaurentis/lips-dev
        token: ${{ secrets.GitHubActions_PAT }}
        path: lips-dev
    - name: Make CUDA discoverable
      run: |
        export CPATH="/usr/include/python3.8:${CPATH}"
        export CPATH="/home/docker/actions-runner/_work/_tool/Python/3.8.14/x64:${CPATH}"
        export PATH="/usr/local/cuda-11.4/bin:${PATH}"
        export LD_LIBRARY_PATH="/usr/local/cuda-11.4/lib64:${LD_LIBRARY_PATH}"
        echo "$PATH" && echo "$LD_LIBRARY_PATH" && nvcc --version && nvidia-smi
        ls /usr/include/python3.8
        ls /home/docker/actions-runner/_work/_tool/Python/3.8.14/x64
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        pip install -e linac-dev[full]
        pip install -e lips-dev
    - name: Lint with flake8
      run: |
        cd linac-dev
        flake8 linac/  --count --max-line-length=190 --statistics --verbose
    - name: Test with pytest
      run: |
        cd linac-dev
        pytest |& tee coverage.txt
    - name: Run update-badges script
      run: |
        cd linac-dev
        python update-badges.py
    - name: Update badges and commit README.md
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        file_pattern: README.md
        repository: linac-dev
        commit_message: "Automatic badge update"
