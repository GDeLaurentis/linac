# -*- coding: utf-8 -*-

name: Continuous Integration

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    branches: [ master ]

jobs:

  test:
    runs-on: [self-hosted, gpu]

    steps:
    - name: Set up Python 3.9
      uses: actions/setup-python@v2
      with:
        python-version: 3.9
    - name: Checkout this Repo (linac-dev)
      uses: actions/checkout@v2
      with:
        path: linac-dev
    - name: Checkout another private Repo (lips-dev)
      uses: actions/checkout@v2
      with:
        repository: GDeLaurentis/lips-dev
        token: ${{ secrets.GitHubActions_PAT }}
        path: lips-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        pip install -e linac-dev[full]
        pip install -e lips-dev
    - name: Lint with flake8
      run: |
        cd linac-dev
        flake8 linac/  --count --max-line-length=190 --statistics --verbose
    - name: Test with pytest
      run: |
        cd linac-dev
        pytest |& tee coverage.txt
    - name: Run update-badges script
      run: |
        cd linac-dev
        python update-badges.py
    - name: Update badges and commit README.md
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        file_pattern: README.md
        repository: linac-dev
        commit_message: "Automatic badge update"
